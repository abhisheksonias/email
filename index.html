<!doctype html>
<html>

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <style type="text/css">
        /* Mobile-first adjustments via media queries for email clients that support them */
        @media only screen and (max-width:480px) {
            .container {
                width: 100% !important;
                max-width: 100% !important;
                margin: 0 !important;
            }

            .inner {
                padding: 16px !important;
            }

            /* Shift layout to top-left corner on small screens */
            .outerCell {
                text-align: left !important;
                padding-left: 16px !important;
                padding-right: 16px !important;
            }

            .top-row td {
                display: block !important;
                width: 100% !important;
                text-align: left !important;
            }

            .logos {
                text-align: left !important;
                padding-bottom: 8px !important;
            }

            .logos td {
                display: inline-block !important;
                padding-right: 8px !important;
            }

            .website {
                display: block !important;
                text-align: left !important;
                padding-top: 8px !important;
                white-space: normal !important;
            }

            .name {
                display: block !important;
                font-size: 18px !important;
                text-align: left !important;
                padding-top: 8px !important;
            }

            .social {
                display: block !important;
                text-align: left !important;
                padding-top: 8px !important;
            }

            .titleSpan {
                display: block !important;
                width: auto !important;
                border-bottom: 1px solid rgba(30, 30, 30, 0.15) !important;
                padding-bottom: 6px !important;
                text-align: left !important;
                margin: 0 !important;
            }

            .titleCell {
                display: block !important;
                text-align: left !important;
                padding-top: 10px !important;
            }

            .cta {
                display: block !important;
                width: 100% !important;
                box-sizing: border-box !important;
                padding: 10px 12px !important;
                margin-top: 10px !important;
                text-align: left !important;
            }

            .contacts {
                display: block !important;
                text-align: left !important;
                padding-top: 10px !important;
            }

            img {
                height: auto !important;
                max-width: 100% !important;
            }
        }

        /* Ensure links don't inherit underline in some email clients */
        a {
            text-decoration: none;
        }
    </style>
</head>

<body style="margin: 0; padding: 0; background: #fff; -webkit-text-size-adjust:100%; -ms-text-size-adjust:100%;">
    <table width="100%" cellpadding="0" cellspacing="0" border="0"
        style="font-family:'Inter', Arial, Helvetica, sans-serif;">
        <tr>
            <td align="left" class="outerCell" style="padding: 28px 28px;">
                <!-- Outer container (white card on light grey) -->
                <table class="container" width="600" cellpadding="0" cellspacing="0" border="0"
                    style="max-width:626px; width:100%; background: #E7E7E7; border-radius: 8px; overflow: hidden; margin:0;">
                    <tr>
                        <td class="inner" style="padding: 28px 30px;">
                            <!-- TOP ROW: logos left, website right -->
                            <table class="top-row" width="100%" cellpadding="0" cellspacing="0" border="0">
                                <tr>
                                    <td valign="middle" style="padding-bottom: 23px;">
                                        <table class="logos" cellpadding="0" cellspacing="0" border="0"
                                            style="vertical-align:middle;">
                                            <tr>
                                                <td style="padding-right:12px; vertical-align:middle;">
                                                    <img src="https://cdn.prod.website-files.com/6862a01712a42e4474917493/698ec90cc08bc85ee5effe2b_appsrow-logo.svg"
                                                        height="31" style="display:block; border:0; outline:none;"
                                                        alt="Appsrow">
                                                </td>
                                                <td style="padding-right:6px; vertical-align:middle;">
                                                    <img src="https://cdn.prod.website-files.com/6862a01712a42e4474917493/698ec90dca36aa32a45d9073_webflow-premium-partner-logo.png"
                                                        height="24" style="display:block; border:0; outline:none;"
                                                        alt="Webflow Partner">
                                                </td>
                                                <td style="vertical-align:middle;">
                                                    <img src="https://cdn.prod.website-files.com/6862a01712a42e4474917493/698ec90cc326f4c64c5d1b45_Global%20Leader.svg"
                                                        height="24" style="display:block; border:0; outline:none;"
                                                        alt="Global Leader">
                                                </td>
                                            </tr>
                                        </table>
                                    </td>

                                    <td align="right" valign="middle" class="website"
                                        style="font-size:16px; color:#1E1E1E; font-weight:500; line-height:160%; white-space:nowrap;">
                                        <a href="https://www.appsrow.com/" style="color:#1E1E1E;">appsrow.com</a>
                                    </td>
                                </tr>
                            </table>

                            <!-- NAME + SOCIAL -->
                            <table width="100%" cellpadding="0" cellspacing="0" border="0">
                                <tr>
                                    <td valign="middle" class="name"
                                        style="font-size:20px; font-weight:700; color:#111111; padding-top:8px;">
                                        Sandeepsingh Sisodiya
                                    </td>

                                    <td align="right" valign="middle" class="social" style="padding-left:12px;">
                                        <a href="https://clutch.co/profile/appsrow-best-webflow-agency-india"
                                            style="text-decoration:none; margin-right:8px;">
                                            <img src="https://cdn.prod.website-files.com/6862a01712a42e4474917493/698ec90d6679b0e2601af1e0_clutch-logo.svg"
                                                alt="Clutch"
                                                style="height:16px; display:inline-block; border:0; outline:none;">
                                        </a>
                                        <a href="https://www.linkedin.com/company/appsrowsolutions"
                                            style="text-decoration:none; margin-right:8px;">
                                            <img src="https://cdn.prod.website-files.com/6862a01712a42e4474917493/698ec90c779abebf43ecd1c3_linkdin-logo.svg"
                                                alt="LinkedIn"
                                                style="height:16px; display:inline-block; border:0; outline:none;">
                                        </a>
                                        <a href="https://dribbble.com/Appsrow" style="text-decoration:none;">
                                            <img src="https://cdn.prod.website-files.com/6862a01712a42e4474917493/698ec90ca5bfb3a82df552fc_dribble-logo.svg"
                                                alt="Dribbble"
                                                style="height:16px; display:inline-block; border:0; outline:none;">
                                        </a>
                                    </td>
                                </tr>
                            </table>

                            <!-- TITLE with border-bottom (not reaching CTA) + CTA on same row -->
                            <table width="100%" cellpadding="0" cellspacing="0" border="0">
                                <tr style="vertical-align:middle;">
                                    <!-- Title left with border-bottom only under the text -->
                                    <td class="titleCell" style="padding-top:0px; font-size:16px; color:#6f6f6f;">
                                        <span class="titleSpan"
                                            style="display:inline-block; padding-bottom:10px; border-bottom:1px solid rgba(30,30,30,0.15); width:auto;">
                                            CEO / Appsrow Solutions
                                        </span>
                                    </td>

                                    <!-- CTA on the same row, aligned right; border not applied here -->
                                    <td align="right" valign="middle"
                                        style="padding-top:8px; white-space:nowrap; padding-top: 20px;">
                                        <a class="cta" href="https://tidycal.com/appsrowsolutions/30-minute-meeting"
                                            style="background: #e61e25; color: #ffffff; padding: 6px 20px; font-size: 14px; font-weight: 400; line-height: 160%; text-decoration: none; border-radius: 8px; display: inline-block; box-shadow: 0 2px 0 rgba(0, 0, 0, 0.06);">
                                            Schedule Call
                                        </a>
                                    </td>
                                </tr>
                                <tr>
                                    <td colspan="2" class="contacts"
                                        style="font-size:14px; color:#1E1E1E; padding-top:12px;">
                                        <a href="mailto:sandeep@appsrow.com"
                                            style="color:#1E1E1E; font-weight:400; line-height:150%;">sandeep@appsrow.com</a>
                                        &nbsp;/&nbsp;
                                        <a href="tel:+91 9725194157"
                                            style="color:#1E1E1E; font-weight:400; line-height:150%;">+91 9725194157</a>
                                    </td>
                                </tr>
                            </table>
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
</body>

</html>
