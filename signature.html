<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Email Signature</title>
    <style>
        @font-face {
            font-family: "RASONATE";
            src: url("./RASONATE/RASONATE-VF.TTF") format("truetype");
            font-style: normal;
            font-weight: 100 900;
        }

        body {
            margin: 0;
            padding: 0;
            background: #777777;
            font-family: "RASONATE", "Segoe UI", "Helvetica Neue", Helvetica, Arial, sans-serif;
        }

        .sig-table {
            width: 620px;
            max-width: 620px;
            border-collapse: collapse;
        }

        .sig-cell {
            padding: 0;
            margin: 0;
        }

        .sig-canvas {
            position: relative;
            width: 620px;
            min-width: 620px;
            max-width: 620px;
            height: 210px;
            overflow: hidden;
            transform: rotate(0deg);
            opacity: 1;
            background-color: #f7f7f7;
        }

        .layer {
            position: absolute;
            display: block;
            pointer-events: none;
        }

        .layer-background {
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            transform: rotate(0deg);
            opacity: 1;
            background: #f7f7f7;
        }

        .layer-element {
            right: -6%;
            top: -14%;
            object-fit: cover;
            width: 55%;
            height: auto;
            z-index: 1;
            transform: rotate(0deg);
            opacity: 1;
        }

        .layer-logo {
            right: 6.5%;
            top: 31%;
            object-fit: contain;
            width: 22%;
            height: auto;
            z-index: 2;
            transform: rotate(0deg);
            opacity: 1;
        }

        .layer-profile-info {
            left: 5%;
            top: 10%;
            width: 35%;
            z-index: 3;
            padding: 0;
            display: grid;
            grid-template-columns: 58px 1fr;
            column-gap: 10px;
            align-items: start;
        }

        .profile-text {
            position: relative;
            margin-top: 9px;
            top: 0;
            align-self: start;
        }

        .layer-profile {
            position: relative;
            left: 0;
            top: 0;
            width: 51.5px;
            height: 60px;
            z-index: 3;
            transform: rotate(0deg);
            opacity: 1;
        }

        .profile-name {
            margin: 0;
            padding: 0;
            font-size: 12px;
            font-weight: 500;
            color: #131316;
            line-height: 1.2;
        }

        .profile-role {
            margin: 2px 0 0 0;
            padding: 0;
            font-size: 8px;
            color: #131316;
            font-weight: 400;
            line-height: 1.2;
        }

        .profile-email {
            margin: 2px 0 0 0;
            padding: 0;
            font-size: 8px;
            color: #131316;
            line-height: 1.2;
        }

        .services-row {
            position: absolute;
            left: 5%;
            bottom: 84px;
            z-index: 4;
            display: flex;
            align-items: center;
            gap: 18px;
        }

        .service-item {
            display: flex;
            align-items: center;
            gap: 6px;
            color: #131316;
            font-size: 8px;
            font-weight: 500;
            white-space: nowrap;
            line-height: 1;
        }

        .service-icon {
            width: 12px;
            height: 12px;
            display: block;
            object-fit: contain;
            flex: 0 0 auto;
        }

        .service-fallback-icon {
            font-size: 12px;
            line-height: 1;
        }

        .service-icon+.service-fallback-icon {
            display: none;
        }

        .contact-block {
            position: absolute;
            left: 5%;
            bottom: 14px;
            z-index: 4;
        }

        .contact-email {
            margin: 0;
            color: #070707;
            font-size: 20px;
            font-weight: 700;
            line-height: 1.05;
            letter-spacing: 0;
        }

        .contact-actions {
            margin-top: 10px;
            display: flex;
            align-items: center;
            gap: 18px;
        }

        .call-button {
            display: inline-flex;
            align-items: center;
            gap: 2px;
            padding: 6px 8px;
            border-radius: 999px;
            background: #070707;
            color: #ffffff;
            text-decoration: none;
            font-size: 9px;
            font-weight: 400;
            line-height: 1;
            white-space: nowrap;
        }

        .call-button svg {
            width: 10px;
            height: 10px;
            display: block;
            flex: 0 0 auto;
        }

        .call-button-icon {
            font-size: 12px;
            line-height: 1;
        }

        .call-button svg+.call-button-icon {
            display: none;
        }

        .website-link {
            display: inline-block;
            color: #131316;
            text-decoration: none;
            font-size: 9px;
            font-weight: 400;
            line-height: 1;
            white-space: nowrap;
        }
    </style>
</head>

<body>
    <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="620" class="sig-table">
        <tr>
            <td class="sig-cell">
                <div class="sig-canvas" role="img" aria-label="Email signature background">
                    <img class="layer layer-background" src="bg.png" alt="" aria-hidden="true" />
                    <img class="layer layer-element" src="side_element.svg" alt="" aria-hidden="true" />
                    <img class="layer layer-logo" src="logo.svg" alt="" aria-hidden="true" />
                    <div class="layer layer-profile-info">
                        <img class="layer layer-profile" src="https://i.ibb.co/mCWY1Psz/profile.jpg" alt=""
                            aria-hidden="true" />
                        <div class="profile-text">
                            <h1 class="profile-name">Abhishek Soni</h1>
                            <p class="profile-role">Founder & Business Strategy Lead</p>
                            <p class="profile-email">Instagram / Linkedin</p>
                        </div>
                    </div>
                    <div class="services-row" aria-label="Services">
                        <div class="service-item">
                            <img class="service-icon" src="branding.svg" alt="" aria-hidden="true" />
                            <span class="service-fallback-icon" aria-hidden="true">&#10051;</span>
                            <span>Branding</span>
                        </div>
                        <div class="service-item">
                            <img class="service-icon" src="3.svg" alt="" aria-hidden="true" />
                            <span class="service-fallback-icon" aria-hidden="true">&#10051;</span>
                            <span>Development</span>
                        </div>
                        <div class="service-item">
                            <img class="service-icon" src="2.svg" alt="" aria-hidden="true" />
                            <span class="service-fallback-icon" aria-hidden="true">&#10051;</span>
                            <span>Marketing &amp; Advertising</span>
                        </div>
                    </div>

                    <div class="contact-block" aria-label="Contact information">
                        <p class="contact-email">hello@beeztech.studio</p>
                        <div class="contact-actions">
                            <a class="call-button" href="https://calendly.com/beeztech-studio/onboarding"
                                target="_blank" rel="noopener noreferrer" aria-label="Book a 15-minute call">Book a
                                15-min call
                                <img class="service-icon" src="4.svg" alt="" aria-hidden="true" />

                            </a>
                            <a class="website-link" href="https://www.beeztech.studio" target="_blank"
                                rel="noopener noreferrer">www.beeztech.studio</a>
                        </div>
                    </div>
                </div>
            </td>
        </tr>
    </table>
</body>



</html>
