<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Email Signature</title>
</head>

<body style="margin:0;padding:0;background:#777777;">
    <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="620" height="220" style="width:620px;max-width:620px;height:220px;border-collapse:collapse;
           font-family:'Segoe UI','Helvetica Neue',Helvetica,Arial,sans-serif;
           background:#f7f7f7;
           background-image: url('https://raw.githubusercontent.com/abhisheksonias/email/main/logo.png'),
                             url('https://raw.githubusercontent.com/abhisheksonias/email/main/side6.png'),
                             url('https://raw.githubusercontent.com/abhisheksonias/email/main/bg.png');
           background-repeat: no-repeat, no-repeat, no-repeat;
           background-position: right 40px bottom 117px, right -10px top 0px, center;
           background-size: 130px auto, contain, cover;">

        <!-- SPACER: top margin = 15px -->
        <tr>
            <td height="15" style="height:15px;font-size:0;line-height:0;padding:0;"><img
                    src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" width="1"
                    height="15" style="display:block;width:1px;height:15px;" alt="" /></td>
        </tr>

        <!-- ROW 1: Avatar + Name block -->
        <tr>
            <td style="padding:0 24px;font-size:0;line-height:0;">
                <table role="presentation" cellpadding="0" cellspacing="0" border="0" style="border-collapse:collapse;">
                    <tr>
                        <td width="62" valign="top" style="width:62px;padding:0;vertical-align:top;">
                            <img src="https://raw.githubusercontent.com/abhisheksonias/email/main/Vector.png"
                                alt="Abhishek Soni" width="52" height="60"
                                style="display:block;border:0;outline:none;text-decoration:none;width:52px;height:60px;" />
                        </td>
                        <td valign="top" style="padding:0;vertical-align:top;">
                            <table role="presentation" cellpadding="0" cellspacing="0" border="0"
                                style="border-collapse:collapse;">
                                <!-- SPACER: push name down from top of avatar = 8px -->
                                <tr>
                                    <td height="8" style="height:8px;font-size:0;line-height:0;padding:0;"><img
                                            src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7"
                                            width="1" height="8" style="display:block;width:1px;height:8px;" alt="" />
                                    </td>
                                </tr>
                                <tr>
                                    <td
                                        style="padding:0;font-size:14px;font-weight:500;color:#131316;line-height:16px;white-space:nowrap;">
                                        Abhishek Soni</td>
                                </tr>
                                <!-- SPACER: name → designation gap = 3px -->
                                <tr>
                                    <td height="3" style="height:3px;font-size:0;line-height:0;padding:0;"><img
                                            src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7"
                                            width="1" height="3" style="display:block;width:1px;height:3px;" alt="" />
                                    </td>
                                </tr>
                                <tr>
                                    <td
                                        style="padding:0;font-size:8px;font-weight:400;color:#131316;line-height:10px;white-space:nowrap;">
                                        Founder &amp; Business Strategy Lead</td>
                                </tr>
                                <!-- SPACER: designation → social gap = 3px -->
                                <tr>
                                    <td height="3" style="height:3px;font-size:0;line-height:0;padding:0;"><img
                                            src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7"
                                            width="1" height="3" style="display:block;width:1px;height:3px;" alt="" />
                                    </td>
                                </tr>
                                <tr>
                                    <td
                                        style="padding:0;font-size:8px;font-weight:400;color:#131316;line-height:10px;white-space:nowrap;">
                                        Instagram / Linkedin</td>
                                </tr>
                            </table>
                        </td>
                    </tr>
                </table>
            </td>
        </tr>

        <!-- SPACER: name block → services gap = 12px -->
        <tr>
            <td height="12" style="height:12px;font-size:0;line-height:0;padding:0;"><img
                    src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" width="1"
                    height="12" style="display:block;width:1px;height:12px;" alt="" /></td>
        </tr>

        <!-- ROW 2: Services -->
        <tr>
            <td style="padding:0 24px;font-size:0;line-height:0;">
                <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="410"
                    style="border-collapse:collapse;width:280px;">
                    <tr>
                        <td width="110" style="width:110px;padding:0 8px 0 0;vertical-align:middle;white-space:nowrap;">
                            <img src="https://raw.githubusercontent.com/abhisheksonias/email/main/1.png" alt=""
                                width="12" height="12"
                                style="display:inline-block;vertical-align:middle;border:0;width:12px;height:12px;" />
                            <span
                                style="display:inline-block;vertical-align:middle;color:#131316;font-size:8px;font-weight:500;line-height:12px;margin-left:4px;">Branding</span>
                        </td>
                        <td width="135" style="width:135px;padding:0 8px 0 0;vertical-align:middle;white-space:nowrap;">
                            <img src="https://raw.githubusercontent.com/abhisheksonias/email/main/2.png" alt=""
                                width="12" height="12"
                                style="display:inline-block;vertical-align:middle;border:0;width:12px;height:12px;" />
                            <span
                                style="display:inline-block;vertical-align:middle;color:#131316;font-size:8px;font-weight:500;line-height:12px;margin-left:4px;">Development</span>
                        </td>
                        <td width="165" style="width:165px;padding:0;vertical-align:middle;white-space:nowrap;">
                            <img src="https://raw.githubusercontent.com/abhisheksonias/email/main/3.png" alt=""
                                width="12" height="12"
                                style="display:inline-block;vertical-align:middle;border:0;width:12px;height:12px;" />
                            <span
                                style="display:inline-block;vertical-align:middle;color:#131316;font-size:8px;font-weight:500;line-height:12px;margin-left:4px;">Marketing
                                &amp; Advertising</span>
                        </td>
                    </tr>
                </table>
            </td>
        </tr>

        <!-- SPACER: services → email gap = 10px -->
        <tr>
            <td height="10" style="height:10px;font-size:0;line-height:0;padding:0;"><img
                    src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" width="1"
                    height="10" style="display:block;width:1px;height:10px;" alt="" /></td>
        </tr>

        <!-- ROW 3: Email address -->
        <tr>
            <td style="padding:0 24px;font-size:0;line-height:0;">
                <a href="mailto:Abhishek@beeztech.studio" style="color:#000000;text-decoration:none;">
                    <span
                        style="color:#000000;text-decoration:none;font-size:20px;font-weight:700;line-height:22px;">Abhishek</span><!--
      --><span style="color:#000000;text-decoration:none;font-size:20px;font-weight:700;line-height:22px;">&#64;</span><!--
      --><span style="color:#000000;text-decoration:none;font-size:20px;font-weight:700;line-height:22px;">beeztech.studio</span>
                </a>
            </td>
        </tr>

        <!-- SPACER: email → button row gap = 7px -->
        <tr>
            <td height="7" style="height:7px;font-size:0;line-height:0;padding:0;"><img
                    src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" width="1"
                    height="7" style="display:block;width:1px;height:7px;" alt="" /></td>
        </tr>

        <!-- ROW 4: CTA button + website URL -->
        <tr>
            <td style="padding:0 24px;font-size:0;line-height:0;">
                <table role="presentation" cellpadding="0" cellspacing="0" border="0"
                    style="border-collapse:collapse;width:200px;">
                    <tr>
                        <td style="padding:0;vertical-align:middle;">
                            <a href="https://calendly.com/beeztech-studio/onboarding" target="_blank"
                                rel="noopener noreferrer"
                                style="display:inline-block;padding:6px 10px;border-radius:999px;background:#070707;color:#ffffff;text-decoration:none;font-size:9px;font-weight:400;line-height:1;white-space:nowrap;">
                                Book a 15-min call
                            </a>
                        </td>
                        <!-- SPACER: button → URL gap = 15px (change this width to adjust) -->
                        <td width="15" style="width:15px;font-size:0;line-height:0;padding:0;"><img
                                src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7"
                                width="15" height="1" style="display:block;width:15px;height:1px;" alt="" /></td>
                        <td style="padding:0;vertical-align:middle;">
                            <a href="https://www.beeztech.studio" target="_blank" rel="noopener noreferrer"
                                style="display:inline-block;color:#131316;text-decoration:none;font-size:9px;font-weight:400;line-height:1;white-space:nowrap;">
                                www.beeztech.studio
                            </a>
                        </td>
                    </tr>
                </table>
            </td>
        </tr>

        <!-- SPACER: bottom margin = 15px -->
        <tr>
            <td height="15" style="height:15px;font-size:0;line-height:0;padding:0;"><img
                    src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" width="1"
                    height="15" style="display:block;width:1px;height:15px;" alt="" /></td>
        </tr>

    </table>
</body>

</html>
